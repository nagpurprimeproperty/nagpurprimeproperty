version: '3.9'
services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env.development
    ports:
      - '4000:4000'
    depends_on:
      - mongo
      - redis

  mongo:
    image: mongo:8
    ports:
      - '27017:27017'
    command: ["mongod", "--replSet", "rs0", "--bind_ip_all"]

  redis:
    image: redis:7-alpine
    ports:
      - '6379:6379'
